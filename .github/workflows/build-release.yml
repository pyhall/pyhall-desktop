# Hall Monitor — Cross-Platform Desktop Build + GPG Release Signing
# Updated (UTC): 2026-03-10T17:53:00Z
# Owner: FΔFΌ★LΔB / Rob Kennedy
# Public key: https://pyhall.dev/gpg.asc  (fingerprint: 3DEF56BB396202E668F7B3B5379C4D5BD7221164)

name: Hall Monitor — Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: macos-13
            platform: macos
          - os: windows-2022
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev gnupg

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hall Monitor ${{ github.ref_name }}"
          releaseBody: |
            Hall Monitor desktop release — connects to Hall Server at localhost:8765.

            **Verify integrity before installing:**
            ```bash
            curl -sS https://pyhall.dev/gpg.asc | gpg --import
            gpg --verify hall-monitor-*.sig hall-monitor-*.<ext>
            ```
            Key fingerprint: `3DEF56BB396202E668F7B3B5379C4D5BD7221164`

            **Install Hall Server first:**
            ```
            pip install pyhall
            pyhall hall start
            ```
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          includeDebug: false
          includeRelease: true

      - name: Import GPG signing key (Linux/macOS)
        if: matrix.platform != 'windows'
        env:
          PYHALL_GPG_PRIVATE_KEY_B64: ${{ secrets.PYHALL_GPG_PRIVATE_KEY_B64 }}
        run: echo "$PYHALL_GPG_PRIVATE_KEY_B64" | base64 -d | gpg --batch --import

      - name: Sign artifacts (Linux)
        if: matrix.platform == 'linux'
        env:
          PYHALL_GPG_FINGERPRINT: ${{ secrets.PYHALL_GPG_FINGERPRINT }}
        run: |
          find src-tauri/target/release/bundle \( -name "*.deb" -o -name "*.AppImage" \) | while read -r f; do
            gpg --batch --yes --armor --detach-sign --local-user "$PYHALL_GPG_FINGERPRINT" "$f"
          done

      - name: Sign artifacts (macOS)
        if: matrix.platform == 'macos'
        env:
          PYHALL_GPG_FINGERPRINT: ${{ secrets.PYHALL_GPG_FINGERPRINT }}
        run: |
          find src-tauri/target/release/bundle -name "*.dmg" | while read -r f; do
            gpg --batch --yes --armor --detach-sign --local-user "$PYHALL_GPG_FINGERPRINT" "$f"
          done

      - name: Import GPG signing key (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          PYHALL_GPG_PRIVATE_KEY_B64: ${{ secrets.PYHALL_GPG_PRIVATE_KEY_B64 }}
        run: |
          $keyBytes = [System.Convert]::FromBase64String($env:PYHALL_GPG_PRIVATE_KEY_B64)
          $keyPath = [System.IO.Path]::GetTempFileName() + ".asc"
          [System.IO.File]::WriteAllBytes($keyPath, $keyBytes)
          gpg --batch --import $keyPath
          Remove-Item $keyPath -Force

      - name: Sign artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          PYHALL_GPG_FINGERPRINT: ${{ secrets.PYHALL_GPG_FINGERPRINT }}
        run: |
          Get-ChildItem -Path "src-tauri	argeteleaseundle" -Recurse -Include "*.msi","*.exe" | ForEach-Object {
            gpg --batch --yes --armor --detach-sign --local-user $env:PYHALL_GPG_FINGERPRINT $_.FullName
          }

      - name: Upload signatures to release (Linux)
        if: matrix.platform == 'linux' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/**/*.deb.asc
            src-tauri/target/release/bundle/**/*.AppImage.asc

      - name: Upload signatures to release (macOS)
        if: matrix.platform == 'macos' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/**/*.dmg.asc

      - name: Upload signatures to release (Windows)
        if: matrix.platform == 'windows' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/**/*.msi.asc
            src-tauri/target/release/bundle/**/*.exe.asc

      - name: Upload artifacts (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: hall-monitor-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.deb.asc
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.AppImage.asc
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.dmg.asc
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.msi.asc
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.exe.asc
          retention-days: 14
          if-no-files-found: warn
